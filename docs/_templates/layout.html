{% extends "!layout.html" %}

{% block footer %}
{{ super() }}
<div class="lang-switcher">
  {% for lang_code, lang_url in languages %}
    {% if not loop.first %} | {% endif %}
    <a href="{{ lang_url }}{{ pagename }}{{ file_suffix }}">{{ lang_code | upper }}</a>
  {% endfor %}
</div>
{% endblock %}
