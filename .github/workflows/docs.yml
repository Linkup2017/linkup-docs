name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:  # 수동 실행 허용

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: docs/requirements.txt

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Compile .po to .mo
        run: sphinx-intl build -d docs/locale

      - name: Build English docs
        run: sphinx-build -b html docs/ docs/_build/site/en

      - name: Build Korean docs
        run: sphinx-build -b html -D language=ko docs/ docs/_build/site/ko

      - name: Translation coverage report
        run: sphinx-intl stat -d docs/locale -l ko || true

      - name: Create root redirect
        run: |
          cat > docs/_build/site/index.html << 'REDIRECT'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="3; url=en/">
            <link rel="canonical" href="https://docs.link-up.co.kr/en/">
            <title>Linkup Infotech Docs</title>
            <script>
              (function() {
                var lang = (navigator.language || '').slice(0, 2);
                if (lang === 'ko') {
                  window.location.replace('ko/');
                } else {
                  window.location.replace('en/');
                }
              })();
            </script>
          </head>
          <body>
            <p>자동으로 이동합니다… Redirecting automatically…</p>
            <p><a href="en/">English</a> | <a href="ko/">한국어</a></p>
          </body>
          </html>
          REDIRECT

      - name: Copy CNAME
        run: if [ -f CNAME ]; then cp CNAME docs/_build/site/CNAME; fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: docs/_build/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
